[theme]
base = "dark"
primaryColor = "#4fa3ff"
backgroundColor = "#0f1117"
secondaryBackgroundColor = "#1a1d26"
textColor = "#f0f2f6"
font = "sans serif"

[server]
headless = true
enableCORS = false
enableXsrfProtection = true
maxUploadSize = 50

[browser]
gatherUsageStats = false

[runner]
fastReruns = true
